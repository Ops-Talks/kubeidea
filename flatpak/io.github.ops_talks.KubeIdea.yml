app-id: io.github.ops_talks.KubeIdea
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: kube-idea
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=~/.kube:ro
modules:
  - name: kube-idea
    buildsystem: simple
    build-commands:
      - mkdir -p /app/kube-idea /app/bin
      - cp -a * /app/kube-idea/
      - chmod +x /app/kube-idea/kube-idea 2>/dev/null || true
      - ln -sf /app/kube-idea/kube-idea /app/bin/kube-idea
    sources:
      - type: dir
        path: bin
