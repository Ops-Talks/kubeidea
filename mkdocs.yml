site_name: Kube-IDEA
site_description: Kubernetes desktop IDE built with Python (Flet + Poetry).
site_url: https://ops-talks.github.io/kubeidea/
repo_name: Ops-Talks/kubeidea
repo_url: https://github.com/Ops-Talks/kubeidea
use_directory_urls: true

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Development: development.md
  - Plugins: plugins.md
  - Security: security.md
  - Contributing: contributing.md

extra_css:
  - stylesheets/extra.css
